<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura-dashboard</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="flex h-screen bg-gray-100">

    <!-- sidebar -->
    <aside class="w-60 flex-shrink-0 flex flex-col bg-gray-800 min-h-screen">

        <!-- Logo -->
        <div class="flex items-center gap-3 h-14 px-4 bg-gray-900">
            <span class="w-7 h-7 rounded-md bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">F</span>
            <span class="text-gray-300 text-sm">Mon Tableau de Bord</span>
        </div>

        <!-- Nav -->
        <nav class="flex-1 overflow-y-auto px-2 py-4 space-y-0.5">

            <a href="./dashboard.html" class="flex items-center gap-2 px-3 py-2 rounded-md text-gray-300 bg-gray-700 text-sm">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Tableau de bord
            </a>

            <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider px-3 pt-4 pb-1">Clients</p>

            <a href="./clients.html" class="flex items-center gap-2 px-3 py-2 rounded-md hover:bg-gray-700 text-white text-sm">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05C16.19 13.89 17 15.02 17 16.5V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                Liste des clients
            </a>

            <a href="./clients.html#nouveau" onclick="toggleForm()" class="flex items-center gap-2 pl-8 pr-3 py-1.5 rounded-md text-gray-400 hover:bg-gray-700 hover:text-gray-200 text-xs">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Nouveau client
            </a>

            <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider px-3 pt-4 pb-1">Factures</p>

            <a href="./facture.html" class="flex items-center gap-2 px-3 py-2 rounded-md text-gray-300 hover:bg-gray-700 text-sm">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM9 13h6v2H9zm0-4h3v2H9z"/></svg>
                Liste des factures
            </a>

            <a href="./facture.html#nouveau" onclick="toggleFormFacture()" class="flex items-center gap-2 pl-8 pr-3 py-1.5 rounded-md text-gray-400 hover:bg-gray-700 hover:text-gray-200 text-xs">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Nouvelle facture
            </a>

            <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider px-3 pt-4 pb-1">Devis</p>

            <a href="./devis.html" class="flex items-center gap-2 px-3 py-2 rounded-md text-gray-300 hover:bg-gray-700 text-sm">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Liste des devis
            </a>

            <a href="./devis.html#nouveau" onclick="toggleFormDevis()" class="flex items-center gap-2 pl-8 pr-3 py-1.5 rounded-md text-gray-400 hover:bg-gray-700 hover:text-gray-200 text-xs">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                Nouveau devis
            </a>

        </nav>

        <!-- Footer utilisateur -->
        <div class="border-t border-gray-700 px-3 py-3 space-y-1">
            <div class="flex items-center gap-2 px-2 py-1">
                <span class="w-7 h-7 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-semibold">A</span>
                <span class="text-gray-300 text-sm">Admin</span>
            </div>
            <a href="./index.html" class="flex items-center gap-2 px-2 py-1.5 rounded-md text-red-400 hover:bg-gray-700 text-sm">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                Déconnexion
            </a>
        </div>

    </aside>

    <!-- Main content -->
    
        <div class="p-4">
            <h1 class="text-2xl font-bold">Tableau de bord</h1>
            <p class="mt-2 text-sm text-gray-600">Bienvenue sur votre espace de gestion</p>
            
        </div>
    </div>
    
</div>
</body>
</html>
